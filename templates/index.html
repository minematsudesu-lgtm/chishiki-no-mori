<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知識の森 - なんでも百科事典</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    header {
      text-align: center;
      padding: 20px 0 12px;
      width: 100%;
      max-width: 760px;
    }

    header h1 {
      font-size: 2rem;
      color: #2e7d32;
      text-shadow: 1px 1px 0 #a5d6a7;
      letter-spacing: 2px;
    }

    header p {
      color: #558b2f;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 760px;
      width: 100%;
      margin: 10px 0 14px;
    }

    .topic-btn {
      background: #fff;
      border: 2px solid #81c784;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      color: #388e3c;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .topic-btn:hover {
      background: #388e3c;
      color: #fff;
      transform: translateY(-1px);
    }

    #chat-container {
      width: 100%;
      max-width: 760px;
      flex: 1;
      background: #ffffffdd;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 420px;
      max-height: 70vh;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .message.assistant .avatar { background: #c8e6c9; }
    .message.user .avatar      { background: #bbdefb; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.assistant .bubble {
      background: #f1f8e9;
      border: 1px solid #c5e1a5;
      border-top-left-radius: 4px;
      color: #1b5e20;
    }

    .message.user .bubble {
      background: #1565c0;
      color: #fff;
      border-top-right-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 14px;
    }

    .typing span {
      width: 8px; height: 8px;
      background: #81c784;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    #input-area {
      padding: 14px 16px;
      background: #f9fbe7;
      border-top: 1px solid #dcedc8;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      border: 2px solid #a5d6a7;
      border-radius: 22px;
      padding: 10px 18px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      color: #1b5e20;
      background: #fff;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: #388e3c; }
    #user-input::placeholder { color: #a5d6a7; }

    #send-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #388e3c;
      color: #fff;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #send-btn:hover  { background: #2e7d32; transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #a5d6a7; cursor: default; transform: none; }

    #mic-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #fff;
      color: #388e3c;
      border: 2px solid #a5d6a7;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #mic-btn:hover { background: #e8f5e9; border-color: #388e3c; }
    #mic-btn.recording {
      background: #ffebee;
      border-color: #e53935;
      color: #e53935;
      animation: pulse 1s infinite;
    }
    #mic-btn:disabled { opacity: 0.4; cursor: default; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .welcome {
      text-align: center;
      color: #66bb6a;
      padding: 30px 20px;
    }
    .welcome .icon { font-size: 3rem; margin-bottom: 10px; }
    .welcome p { font-size: 1rem; line-height: 1.8; color: #558b2f; }
  </style>
</head>
<body>

<header>
  <h1>🌳 知識の森</h1>
  <p>なんでも聞いてね！小学5年生のための百科事典</p>
</header>

<div class="topics">
  <button class="topic-btn" onclick="ask('カブトムシについて教えて！')">🪲 昆虫</button>
  <button class="topic-btn" onclick="ask('太陽系の惑星を教えて')">🪐 宇宙・星</button>
  <button class="topic-btn" onclick="ask('民主主義って何？')">🏛️ 社会・政治</button>
  <button class="topic-btn" onclick="ask('光合成のしくみを教えて')">🌿 理科・自然</button>
  <button class="topic-btn" onclick="ask('縄文時代と弥生時代の違いは？')">📜 歴史</button>
  <button class="topic-btn" onclick="ask('なぜ海の水はしょっぱいの？')">🌊 地球・環境</button>
  <button class="topic-btn" onclick="ask('ことわざ「石の上にも三年」の意味は？')">📖 言葉・国語</button>
  <button class="topic-btn" onclick="ask('なぜ夢を見るの？')">🧠 人体・健康</button>
  <button class="topic-btn" onclick="ask('AIってどうやって動いているの？')">💻 テクノロジー</button>
  <button class="topic-btn" onclick="ask('オリンピックはいつから始まったの？')">🏅 スポーツ</button>
</div>

<div id="chat-container">
  <div id="messages">
    <div class="welcome">
      <div class="icon">🌱</div>
      <p>こんにちは！「知識の森」へようこそ！<br>
      生き物・宇宙・社会・言葉・歴史… なんでも聞いてね。<br>
      上のボタンか、下の入力欄から質問してみよう！</p>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="質問を入力してね…" maxlength="500"></textarea>
    <button id="mic-btn" onclick="toggleMic()" title="音声入力">🎤</button>
    <button id="send-btn" onclick="sendMessage()" title="送信">➤</button>
  </div>
</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  let history = [];
  let isLoading = false;

  // Enterで送信（Shift+Enterは改行）
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // テキストエリアの高さ自動調整
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  function ask(text) {
    inputEl.value = text;
    sendMessage();
  }

  function addMessage(role, text) {
    // ウェルカム画面を消す
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'assistant' ? '🌳' : '😊';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🌳';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  // 音声入力
  const micBtn = document.getElementById('mic-btn');
  let recognition = null;
  let isRecording = false;

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      inputEl.value = transcript;
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    };

    recognition.onend = () => {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      if (inputEl.value.trim()) sendMessage();
    };

    recognition.onerror = () => {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
    };
  } else {
    micBtn.disabled = true;
    micBtn.title = 'このブラウザは音声入力に対応していません';
  }

  function toggleMic() {
    if (!recognition) return;
    if (isRecording) {
      recognition.stop();
    } else {
      inputEl.value = '';
      recognition.start();
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = '⏹️';
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage('assistant', '⚠️ エラーが発生したよ: ' + data.error);
      } else {
        addMessage('assistant', data.reply);
        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: data.reply });
        // 会話履歴は直近20件に絞る
        if (history.length > 20) history = history.slice(-20);
      }
    } catch (err) {
      removeTyping();
      addMessage('assistant', '⚠️ 通信エラーが起きたよ。もう一度試してみてね。');
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
